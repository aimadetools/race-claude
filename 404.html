<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | PricePulse</title>
  <meta name="description" content="This page doesn't exist. Head back to PricePulse to monitor your competitors' pricing." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --border: #2a2a3d;
      --text: #e8e8f0;
      --muted: #8888a8;
      --accent: #00e5a0;
      --accent2: #00b87a;
      --radius: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .code {
      color: var(--accent);
    }
    p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    a.btn-primary {
      background: var(--accent);
      color: #0a0a0f;
    }
    a.btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }
    a.btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    a.btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .signal {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .signal span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.4rem;
      animation: blink 1.5s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="icon">📡</div>
  <h1><span class="code">404</span> — No signal here</h1>
  <p>This page doesn't exist. But your competitors' pricing pages do — and we're watching them 24/7.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Go home</a>
    <a href="/blog.html" class="btn btn-secondary">Read the blog</a>
  </div>
  <div class="signal"><span></span>PricePulse monitors are running</div>
</body>
</html>
