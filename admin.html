<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PricePulse Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a26;
      --border: #2a2a3d;
      --text: #e8e8f0;
      --muted: #8888a8;
      --accent: #00e5a0;
      --accent2: #00b87a;
      --warning: #f59e0b;
      --red: #ef4444;
      --radius: 12px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* Login screen */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .login-card p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--accent2); }

    .error-msg {
      color: var(--red);
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* Dashboard */
    #dashboard { display: none; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 64px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-size: 1.125rem; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--muted); font-weight: 400; font-size: 0.875rem; margin-left: 0.5rem; }

    .header-actions { display: flex; align-items: center; gap: 1rem; }

    .refresh-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      transition: border-color 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); }

    .logout-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.5rem;
    }
    .logout-btn:hover { color: var(--red); }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .loading-banner {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      text-align: center;
      color: var(--muted);
    }

    .loading-banner .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.warning { color: var(--warning); }

    .stat-sub {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.375rem;
    }

    /* User breakdown */
    .plan-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--border);
      margin-top: 0.75rem;
    }
    .plan-bar-free { background: var(--border); }
    .plan-bar-starter { background: var(--accent2); }
    .plan-bar-pro { background: var(--accent); }

    .plan-legend {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .plan-legend-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Sections */
    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .section-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .section-header .badge {
      display: inline-block;
      background: var(--bg3);
      border-radius: 99px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.125rem 0.5rem;
      margin-left: 0.5rem;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      background: var(--bg3);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.5rem;
      text-align: left;
    }

    tbody tr {
      border-top: 1px solid var(--border);
    }

    tbody tr:hover { background: var(--bg3); }

    tbody td {
      padding: 0.875rem 1.5rem;
      color: var(--text);
    }

    .plan-badge {
      display: inline-block;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      text-transform: capitalize;
    }

    .plan-badge.free { background: rgba(136,136,168,0.15); color: var(--muted); }
    .plan-badge.starter { background: rgba(0,184,122,0.15); color: var(--accent2); }
    .plan-badge.pro { background: rgba(0,229,160,0.2); color: var(--accent); }

    .time-ago { color: var(--muted); font-size: 0.8125rem; }

    /* Email stats */
    .email-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      padding: 1.5rem;
    }

    .email-stat {
      text-align: center;
    }

    .email-stat-count {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }

    .email-stat-label {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .no-data {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .last-updated {
      color: var(--muted);
      font-size: 0.8125rem;
    }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      thead { display: none; }
      tbody tr { display: block; padding: 1rem 1.5rem; }
      tbody td { display: flex; justify-content: space-between; padding: 0.25rem 0; border: none; }
      tbody td::before { content: attr(data-label); color: var(--muted); font-size: 0.75rem; }
    }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>PricePulse</h1>
    <p>Admin dashboard — internal only</p>
    <input type="password" id="admin-password" placeholder="Admin password" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Sign in</button>
    <div class="error-msg" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div>
      <span class="logo">PricePulse Admin</span>
      <span class="logo"><span id="last-updated" class="last-updated"></span></span>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="loadStats()">Refresh</button>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main>
    <div id="loading" class="loading-banner">
      <div class="spinner"></div>
      Loading stats...
    </div>

    <div id="stats-content" style="display:none">
      <!-- MRR + user summary -->
      <div class="stats-grid" id="main-stats"></div>

      <!-- User plan breakdown -->
      <div class="section" id="plan-section" style="display:none">
        <div class="section-header">User Plan Distribution</div>
        <div style="padding:1.5rem">
          <div class="plan-bar" id="plan-bar"></div>
          <div class="plan-legend" id="plan-legend"></div>
        </div>
      </div>

      <!-- Email automation stats -->
      <div class="section">
        <div class="section-header">Email Automation <span class="badge">last 7 days</span></div>
        <div class="email-stats-grid" id="email-stats">
          <div class="no-data">No email_log table yet — run the migration first.</div>
        </div>
      </div>

      <!-- Recent signups -->
      <div class="section">
        <div class="section-header">Recent Signups <span class="badge" id="signups-badge"></span></div>
        <div id="signups-table-container">
          <div class="no-data">Loading...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const SESSION_KEY = 'pp_admin_secret';

  // On load, check if already authenticated
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem(SESSION_KEY);
    if (saved) {
      showDashboard();
      loadStats(saved);
    }

    document.getElementById('admin-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  function doLogin() {
    const pw = document.getElementById('admin-password').value.trim();
    if (!pw) return;
    sessionStorage.setItem(SESSION_KEY, pw);
    showDashboard();
    loadStats(pw);
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-password').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  async function loadStats(pw) {
    const secret = pw || sessionStorage.getItem(SESSION_KEY);
    if (!secret) return;

    document.getElementById('loading').style.display = 'block';
    document.getElementById('stats-content').style.display = 'none';

    try {
      const res = await fetch('/api/admin-stats', {
        headers: { 'Authorization': `Bearer ${secret}` }
      });

      if (res.status === 401) {
        sessionStorage.removeItem(SESSION_KEY);
        document.getElementById('loading').style.display = 'none';
        doLogout();
        document.getElementById('login-error').style.display = 'block';
        return;
      }

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      renderStats(data);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('stats-content').style.display = 'block';
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById('loading').innerHTML =
        `<p style="color:var(--red)">Failed to load: ${err.message}</p>
         <button class="btn-primary" style="margin-top:1rem;width:auto;padding:0.5rem 1.5rem" onclick="loadStats()">Retry</button>`;
    }
  }

  function renderStats(d) {
    // Main stats grid
    const totalPaid = d.users.starter + d.users.pro;
    const convRate = d.users.total > 0
      ? ((totalPaid / d.users.total) * 100).toFixed(1)
      : '0.0';

    document.getElementById('main-stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">MRR</div>
        <div class="stat-value accent">$${d.mrr.toLocaleString()}</div>
        <div class="stat-sub">${totalPaid} paid users</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value">${d.users.total}</div>
        <div class="stat-sub">${d.users.free} free · ${d.users.starter} starter · ${d.users.pro} pro</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">New Signups</div>
        <div class="stat-value">${d.signups.last_7_days}</div>
        <div class="stat-sub">last 7 days · ${d.signups.last_30_days} last 30d</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conversion Rate</div>
        <div class="stat-value ${parseFloat(convRate) >= 10 ? 'accent' : ''}">${convRate}%</div>
        <div class="stat-sub">free → paid</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Monitors</div>
        <div class="stat-value">${d.monitors.active}</div>
        <div class="stat-sub">${d.monitors.total} total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Alerts Sent</div>
        <div class="stat-value">${d.alerts_sent_last_7_days}</div>
        <div class="stat-sub">last 7 days</div>
      </div>
    `;

    // Plan bar
    if (d.users.total > 0) {
      document.getElementById('plan-section').style.display = 'block';
      const freePct = (d.users.free / d.users.total * 100).toFixed(1);
      const starterPct = (d.users.starter / d.users.total * 100).toFixed(1);
      const proPct = (d.users.pro / d.users.total * 100).toFixed(1);
      document.getElementById('plan-bar').innerHTML = `
        <div class="plan-bar-free" style="width:${freePct}%"></div>
        <div class="plan-bar-starter" style="width:${starterPct}%"></div>
        <div class="plan-bar-pro" style="width:${proPct}%"></div>
      `;
      document.getElementById('plan-legend').innerHTML = `
        <div class="plan-legend-item"><div class="legend-dot" style="background:var(--border)"></div> Free (${d.users.free})</div>
        <div class="plan-legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Starter (${d.users.starter})</div>
        <div class="plan-legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Pro (${d.users.pro})</div>
      `;
    }

    // Email automation stats
    const emailTypes = ['welcome', 'activation_nudge', 'upgrade_prompt', 'reengagement'];
    const emailLabels = {
      welcome: 'Welcome',
      activation_nudge: 'Activation Nudge',
      upgrade_prompt: 'Upgrade Prompt',
      reengagement: 'Re-engagement',
    };

    const hasEmailData = Object.keys(d.emails_sent_last_7_days).length > 0;
    if (hasEmailData) {
      let emailHtml = '';
      for (const type of emailTypes) {
        const count = d.emails_sent_last_7_days[type] || 0;
        emailHtml += `
          <div class="email-stat">
            <div class="email-stat-count">${count}</div>
            <div class="email-stat-label">${emailLabels[type]}</div>
          </div>
        `;
      }
      document.getElementById('email-stats').innerHTML = emailHtml;
    } else {
      document.getElementById('email-stats').innerHTML =
        '<div class="no-data">email_log table not found — run the migration from docs/schema-migration-email-log.sql</div>';
    }

    // Recent signups table
    document.getElementById('signups-badge').textContent = `${d.recent_signups.length} recent`;

    if (d.recent_signups.length === 0) {
      document.getElementById('signups-table-container').innerHTML =
        '<div class="no-data">No signups yet</div>';
    } else {
      const rows = d.recent_signups.map(u => `
        <tr>
          <td data-label="Email">${escHtml(u.email)}</td>
          <td data-label="Plan"><span class="plan-badge ${u.plan}">${u.plan}</span></td>
          <td data-label="Status">${u.status}</td>
          <td data-label="Signed up" class="time-ago">${timeAgo(u.created_at)}</td>
        </tr>
      `).join('');

      document.getElementById('signups-table-container').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Plan</th>
              <th>Status</th>
              <th>Signed up</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(mins / 60);
    const days = Math.floor(hrs / 24);
    if (days > 0) return `${days}d ago`;
    if (hrs > 0) return `${hrs}h ago`;
    if (mins > 0) return `${mins}m ago`;
    return 'just now';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
